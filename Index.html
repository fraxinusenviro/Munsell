<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoilColor - Munsell Estimator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="container">
    <h1>SoilColor Munsell App</h1>

    <div class="upload-section">
        <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
        <button id="open-file-btn" type="button">Take Photo or Upload</button>
        <div class="canvas-wrap">
            <canvas id="image-canvas"></canvas>
            <div id="magnifier"></div>
        </div>
    </div>

    <div class="sampler-box">
        <div class="selection-display">
            <div id="active-color-preview" class="color-preview" style="background: #ccc;"></div>
            <div>
                <strong>Selected:</strong> <span id="rgb-val">None</span><br>
                <small>Estimated Munsell: <span id="munsell-val">N/A</span></small>
            </div>
        </div>
        <div class="controls">
            <select id="feature-type">
                <option value="Matrix">Matrix</option>
                <option value="Redox">Redox Feature</option>
            </select>
            <input type="number" id="percent-val" placeholder="% (e.g. 80)" min="0" max="100">
            <button class="full-width" onclick="saveSample()">Save Sample to Table</button>
        </div>
    </div>

    <div class="meta-form">
        <input type="text" id="sample-id" placeholder="Sample ID">
        <input type="text" id="site-name" placeholder="Site Name">
        <input type="text" id="project-name" placeholder="Project Name" class="full-width">
        <div class="full-width meta-info">
            <strong>Auto-GPS:</strong> <span id="gps-display">No GPS found in EXIF</span><br>
            <strong>Date:</strong> <span id="date-display">N/A</span>
        </div>
    </div>

    <table id="results-table">
        <thead>
            <tr>
                <th>Type</th>
                <th>Munsell</th>
                <th>%</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <button class="export-btn" onclick="generateReport()">Generate Soil Sample Report (PDF)</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
